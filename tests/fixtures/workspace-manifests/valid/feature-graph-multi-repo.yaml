schema_version: 1
workspace_id: orbit
description: Multi-repo feature graph validation fixture.
repos:
  - id: api
    remote: git@github.com:example/api.git
    default_branch: main
    role: backend
    language: ruby
    runtime: ruby3.3
    build_system: bundler
    issue_backend:
      type: repo_issues
      repo: example/api

  - id: web
    remote: git@github.com:example/web.git
    default_branch: main
    role: webapp
    language: typescript
    runtime: node20
    build_system: pnpm
    issue_backend:
      type: repo_issues
      repo: example/web

  - id: infra
    path: ../infra
    default_branch: main
    role: devops
    language: hcl
    runtime: terraform
    build_system: terraform
    issue_backend:
      type: external_tracker
      tracker: jira
      mapping:
        project_key: INFRA

features:
  - feature_id: rollout-bridge
    title: Bridge rollout
    integration:
      github:
        project:
          project_id: PVT_kwDOXYZ123
          item_id: PVTI_kwDOXYZ123
        child_issue_links:
          - task_id: api-prepare
            repo: example/api
            issue_number: 101
          - task_id: web-release
            repo: example/web
            issue_number: 88
        sync:
          status: partial
          retry_count: 1
          dedupe_key: orbit:rollout-bridge:github
    tasks:
      - id: api-prepare
        feature_id: rollout-bridge
        repo_id: api
        title: Prepare backend contract
        status: done
        integration:
          github:
            issue:
              repo: example/api
              number: 101
              url: https://github.com/example/api/issues/101
            pull_requests:
              - repo: example/api
                number: 44
                url: https://github.com/example/api/pull/44
            project_items:
              - project_id: PVT_kwDOXYZ123
                item_id: PVTI_kwDOXYZ124
            sync:
              status: synced
              retry_count: 0
              dedupe_key: orbit:rollout-bridge:api-prepare
        child_ids:
          - infra-gates
      - id: infra-gates
        feature_id: rollout-bridge
        repo_id: infra
        title: Define infra gates
        status: in_progress
        parent_ids:
          - api-prepare
        child_ids:
          - web-release
      - id: web-release
        feature_id: rollout-bridge
        repo_id: web
        title: Release web flow
        status: blocked
        integration:
          github:
            issue:
              repo: example/web
              number: 88
              url: https://github.com/example/web/issues/88
            project_items:
              - project_id: PVT_kwDOXYZ123
                item_id: PVTI_kwDOXYZ125
            sync:
              status: error
              retry_count: 2
              last_error: API rate limit
              dedupe_key: orbit:rollout-bridge:web-release
        parent_ids:
          - infra-gates
        blocked_by_ids:
          - infra-gates
      - id: ops-signoff
        feature_id: rollout-bridge
        repo_id: infra
        title: Confirm rollout signoff
        status: todo
        blocked_by_ids:
          - api-prepare
      - id: web-smoke
        feature_id: rollout-bridge
        repo_id: web
        title: Smoke test web flow
        status: todo
        blocked_by_ids:
          - web-release
