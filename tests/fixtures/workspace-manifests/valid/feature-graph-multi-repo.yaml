schema_version: 1
workspace_id: orbit
description: Multi-repo feature graph validation fixture.
repos:
  - id: api
    remote: git@github.com:example/api.git
    default_branch: main
    role: backend
    language: ruby
    runtime: ruby3.3
    build_system: bundler
    issue_backend:
      type: repo_issues
      repo: example/api

  - id: web
    remote: git@github.com:example/web.git
    default_branch: main
    role: webapp
    language: typescript
    runtime: node20
    build_system: pnpm
    issue_backend:
      type: github_project
      project_id: PVT_kwDOXYZ123

  - id: infra
    path: ../infra
    default_branch: main
    role: devops
    language: hcl
    runtime: terraform
    build_system: terraform
    issue_backend:
      type: external_tracker
      tracker: jira
      mapping:
        project_key: INFRA

features:
  - feature_id: rollout-bridge
    title: Bridge rollout
    tasks:
      - id: api-prepare
        feature_id: rollout-bridge
        repo_id: api
        title: Prepare backend contract
        status: done
        child_ids:
          - infra-gates
      - id: infra-gates
        feature_id: rollout-bridge
        repo_id: infra
        title: Define infra gates
        status: in_progress
        parent_ids:
          - api-prepare
        child_ids:
          - web-release
      - id: web-release
        feature_id: rollout-bridge
        repo_id: web
        title: Release web flow
        status: blocked
        parent_ids:
          - infra-gates
        blocked_by_ids:
          - infra-gates
