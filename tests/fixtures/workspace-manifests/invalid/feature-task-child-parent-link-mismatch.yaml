schema_version: 1
workspace_id: orbit
repos:
  - id: api
    remote: git@github.com:example/api.git
    default_branch: main
    role: backend
    build_system: bundler
    issue_backend:
      type: repo_issues
      repo: example/api
features:
  - feature_id: rollout-bridge
    title: Bridge rollout
    tasks:
      - id: task-a
        feature_id: rollout-bridge
        repo_id: api
        title: Task A
        status: in_progress
        child_ids:
          - task-b
      - id: task-b
        feature_id: rollout-bridge
        repo_id: api
        title: Task B
        status: todo
