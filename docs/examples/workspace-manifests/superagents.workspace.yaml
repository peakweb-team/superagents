schema_version: 1
workspace_id: atlas-x

description: Cross-language feature delivery for protocol, infra, and clients.
repos:
  - id: protocol-core
    remote: git@github.com:example/protocol-core.git
    default_branch: main
    role: protocol
    language: solidity
    runtime: evm
    build_system: foundry
    issue_backend:
      type: repo_issues
      repo: example/protocol-core
    ownership:
      team: protocol
      owners:
        - team-protocol
    policy_refs:
      - policy://solidity/foundry-v1

  - id: infra-live
    path: ../infra-live
    default_branch: main
    role: devops
    language: hcl
    runtime: terraform
    build_system: terraform
    issue_backend:
      type: external_tracker
      tracker: jira
      mapping:
        project_key: INFRA
        board: platform
    ownership:
      team: platform
      owners:
        - team-platform
    policy_refs:
      - policy://terraform/plan-apply-gates

  - id: web-console
    remote: https://github.com/example/web-console.git
    default_branch: develop
    role: webapp
    language: typescript
    runtime: node20
    build_system: pnpm-workspace
    issue_backend:
      type: github_project
      project_id: PVT_kwDOABC1234
    ownership:
      team: web
      owners:
        - team-web

  - id: mobile-wallet
    remote: git@github.com:example/mobile-wallet.git
    default_branch: main
    role: mobile
    language: kotlin
    runtime: jvm
    build_system: gradle
    issue_backend:
      type: none
    ownership:
      team: mobile
      owners:
        - team-mobile

features:
  - feature_id: crosschain-wallet-v2
    title: Cross-chain wallet v2
    description: Coordinate protocol, infra, web, and mobile work items under one release feature.
    integration:
      github:
        project:
          project_id: PVT_kwDOABC1234
        child_issue_links:
          - task_id: protocol-risk-review
            repo: example/protocol-core
            issue_number: 201
          - task_id: web-release-controls
            repo: example/web-console
            issue_number: 822
        sync:
          status: partial
          retry_count: 1
          dedupe_key: atlas-x:crosschain-wallet-v2
    tasks:
      - id: protocol-risk-review
        feature_id: crosschain-wallet-v2
        repo_id: protocol-core
        title: Finalize protocol risk review
        status: done
        integration:
          github:
            issue:
              repo: example/protocol-core
              number: 201
            pull_requests:
              - repo: example/protocol-core
                number: 334
            project_items:
              - project_id: PVT_kwDOABC1234
                item_id: PVTI_kwDOABC1235
            sync:
              status: synced
              dedupe_key: atlas-x:crosschain-wallet-v2:protocol-risk-review
        child_ids:
          - infra-rollout-plan

      - id: infra-rollout-plan
        feature_id: crosschain-wallet-v2
        repo_id: infra-live
        title: Define rollout plan and deployment gates
        status: in_progress
        parent_ids:
          - protocol-risk-review
        child_ids:
          - web-release-controls
          - mobile-release-controls

      - id: web-release-controls
        feature_id: crosschain-wallet-v2
        repo_id: web-console
        title: Add web release controls and observability hooks
        status: blocked
        integration:
          github:
            issue:
              repo: example/web-console
              number: 822
            project_items:
              - project_id: PVT_kwDOABC1234
                item_id: PVTI_kwDOABC1236
            sync:
              status: error
              retry_count: 2
              last_error: timed out while updating project item
              dedupe_key: atlas-x:crosschain-wallet-v2:web-release-controls
        parent_ids:
          - infra-rollout-plan
        blocked_by_ids:
          - infra-rollout-plan

      - id: mobile-release-controls
        feature_id: crosschain-wallet-v2
        repo_id: mobile-wallet
        title: Add mobile release controls and staged rollout toggles
        status: todo
        parent_ids:
          - infra-rollout-plan
